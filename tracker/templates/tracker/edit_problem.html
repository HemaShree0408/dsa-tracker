{% extends 'tracker/base.html' %}

{% block title %}Edit Problem - DSA Tracker{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="margin-bottom: 2rem;">
        <a href="{% url 'topic_problems' problem.topic.id %}" style="color: var(--text-secondary); text-decoration: none; margin-bottom: 0.5rem; display: inline-block;">&larr; Back to {{ problem.topic.name }}</a>
        <h1>Edit Problem</h1>
        <h3 style="margin-top: 0;">{{ problem.name }}</h3>
    </div>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            <table>
                {{ form.as_table }}
            </table>
            
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                <a href="{% url 'topic_problems' problem.topic.id %}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
